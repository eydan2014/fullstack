# ===== Rutas de documentacion (proxy hacia /v3/api-docs de cada servicio) =====
# Cada una expone /docs/<servicio>/v3/api-docs -> lb://<servicio>/v3/api-docs
# para que Swagger UI del gateway pueda agregarlas todas en un solo dropdown.
spring.cloud.gateway.server.webmvc.routes[10].id=docs-ms-pedidos
spring.cloud.gateway.server.webmvc.routes[10].uri=lb://ms-pedidos
spring.cloud.gateway.server.webmvc.routes[10].predicates[0]=Path=/docs/ms-pedidos/v3/api-docs
spring.cloud.gateway.server.webmvc.routes[10].filters[0]=SetPath=/v3/api-docs

