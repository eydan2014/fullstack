
spring.application.name=resena
server.port=${PORT:8090}

# CONFIGURACIÓN DE BASE DE DATOS PARAMETRIZADA PARA DOCKER
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:db_resena}?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CONFIGURACIÓN DE JPA HIBERNATE
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# CONFIGURACIÓN FLYWAY
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# CONFIGURACIÓN DE DOCUMENTACIÓN SWAGGER / SPRINGDOC
springdoc.swagger-ui.path=/swagger
springdoc.api-docs.path=/v3/api-docs

# CONFIGURACIÓN DE LOGS
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.com.example.resena=INFO
logging.file.name=logs/resena.log


# INTEGRACIÓN CON EL SERVIDOR DE DESCUBRIMIENTO EUREKA
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true