spring:
  application:
    name: ms-cocina

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cocina_coffee}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${PORT:8085}

logging:
  level:
    org.springframework.web: INFO
    org.hibernate: INFO
    com.example.ms_cocina: INFO
  file:
    name: logs/ms-cocina.log

jwt:
  secret: ${JWT_SECRET:mysecreto98765432112345698778912}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /v3/api-docs