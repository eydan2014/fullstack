spring.application.name=fidelidad
server.port=8087

spring.datasource.url=jdbc:mysql://localhost:3306/db_fidelidad
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracion de JPA Hibernate
# La línea del dialecto se elimina para que Hibernate lo detecte solo
spring.jpa.hibernate.ddl-auto=update 
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuracion Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Configuracion de Log
logging.level.org.springframework.web=INFO

# Ruta para el Microservicio de Fidelidad
spring.cloud.gateway.server.webmvc.routes[3].id=ms-fidelidad
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://ms-fidelidad
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/fidelidad/**

