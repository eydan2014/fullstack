spring.application.name=menu
server.port=8083

#  CONFIGURACIÓN DE BASE DE DATOS PARAMETRIZADA PARA DOCKER
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:db_menu}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CONFIGURACIÓN DE JPA HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CONFIGURACIÓN FLYWAY
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# CONFIGURACIÓN DE LOGS
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO

# SEGURIDAD JWT (Compartida entre todos tus servicios)
jwt.secret=${JWT_SECRET:mysecreto98765432112345698778912}


eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true