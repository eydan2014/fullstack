spring.application.name=pago
server.port=8084


spring.datasource.url=jdbc:mysql://localhost:3306/db_pagos
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#configuracion  de jpa hibernate
#
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# configuracion flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
#  configuracion de log
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

spring.cloud.gateway.server.webmvc.routes[2].id=ms-pago
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://ms-pago
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/pagos/**


eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

