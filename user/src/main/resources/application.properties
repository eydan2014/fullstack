spring.application.name=user

server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/ms-usuario
spring.datasource.username=root
spring.datasource.password=

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#configuracion  de jpa hibernate
#
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# configuracion flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
#  configuracion de log
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO

spring.cloud.gateway.server.webmvc.routes[3].id=user
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://user
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/auth/**


