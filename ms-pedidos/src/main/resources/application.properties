spring.application.name=ms-pedidos
server.port=${PORT:8081}

# base de datos
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/pedidos_coffee}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# configuracion de jpa
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# configuracion flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# configuracion de log
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.com.example.ms_pedidos=INFO
logging.file.name=logs/ms-pedidos.log

# jwt
jwt.secret=${JWT_SECRET:mysecreto98765432112345698778912}

# eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger
springdoc.api-docs.path=/v3/api-docs