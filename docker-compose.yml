services:

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: appuser
      MYSQL_PASSWORD: 1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    mem_limit: 700m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend-network

  ms-eureka:
    build: ./ms-eureka
    container_name: ms-eureka
    restart: unless-stopped
    ports:
      - "8761:8761"
    mem_limit: 384m
    networks:
      - backend-network

  ms-pedidos:
    build: ./ms-pedidos
    container_name: ms-pedidos
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: pedidos_coffee
      DB_USER: appuser
      DB_PASSWORD: 1234
      JWT_SECRET: mysecreto98765432112345698778912
      EUREKA_URL: http://ms-eureka:8761/eureka/
    mem_limit: 384m
    depends_on:
      mysql:
        condition: service_healthy
      ms-eureka:
        condition: service_started
      user:
        condition: service_started
      menu:
        condition: service_started
    networks:
      - backend-network

  ms-cocina:
    build: ./ms-cocina
