# 🚀 CONFIGURACIÓN DE ENTORNO DE PRUEBAS
spring.application.name=inventario-test
server.port=0

# 🗄️ BASE DE DATOS H2 EN MEMORIA (Aislada y rápida)
spring.datasource.url=jdbc:h2:mem:db_inventario_test;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# 🔹 DIALECTO CORREGIDO PARA EVITAR EL CONFIG 'ENGINE=INNODB'
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# 🔹 CONFIGURACIÓN JPA PARA TEST
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# 🔄 DESHABILITAR FLYWAY EN TESTS
spring.flyway.enabled=false